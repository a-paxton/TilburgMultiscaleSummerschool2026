name: summerschool-processing-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - librosa
  - pysoundfile
  - ffmpeg
  - ipykernel
  - requests
  - pip:
      - torch==2.13.0
      - torchaudio==2.11.0
      - pyannote-audio==4.0.7
      - pyannoteai-sdk==0.4.0
      - praat-parselmouth==0.4.7
      - opensmile==2.5.0
      - audiofile==1.3.0
